---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-sa
  namespace: lab-pack

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: postgres-role
  namespace: lab-pack
rules:
  # Basic access rule allowing the pod to look at its own configuration map if needed
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: postgres-rb
  namespace: lab-pack
roleRef:
  kind: Role
  name: postgres-role
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: postgres-sa
    namespace: lab-pack

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: lab-pack
  labels:
    app.kubernetes.io/name: postgres
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres-port
      protocol: TCP
      port: 5432
      targetPort: 5432


---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-worker-pv
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual # Matches the storageClassName in the PVC
  # local:
  #   path: /mnt/data/postgres # A clean path on the worker node filesystem
  hostPath:
    path: /mnt/data/postgres
    type: DirectoryOrCreate # This automatically generates the path if it's missing!
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - ckad-docker-m02 # Securely locks this storage space to the worker node

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: lab-pack
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: foliohive
    spec:
      serviceAccountName: postgres-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 999   # Explicitly matches the native internal postgres Linux user ID
        fsGroup: 999     # Forces disk mounts to be owned by the postgres group permissions
      containers:
        - name: postgres-container
          image: postgres:18.4-bookworm
          securityContext:
            allowPrivilegeEscalation: false
            # NOTE: We do NOT set readOnlyRootFilesystem to true here, as standard Postgres images 
            # actively write runtime system statistics, lockfiles, and configuration files to /var/run/postgresql
          ports:
            - name: postgres-port
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql
              subPath: postgres-data
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: manual
        resources:
          requests:
            storage: 5Gi